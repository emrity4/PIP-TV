<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIP-TV Splash</title>
<style>
:root { --primary: #E50914; }
body {
  margin:0; height:100vh; background:#0A0A0B; overflow:hidden;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  font-family:Arial,Helvetica,sans-serif;
}
.glow {
  position:fixed; width:600px; height:600px; border-radius:50%;
  background:radial-gradient(circle,rgba(229,9,20,0.08) 0%,transparent 70%);
  animation:pulse 3s ease-in-out infinite; pointer-events:none;
}
@keyframes pulse {
  0%,100%{transform:scale(1);opacity:0.5}
  50%{transform:scale(1.2);opacity:1}
}
.logo {
  display:flex; align-items:center; justify-content:center; gap:6px;
  opacity:0; transform:translateX(50%);
  animation:slideIn 1.9s ease-out forwards;
}
.letter {
  font-size:130px; font-weight:900; color:var(--primary);
  display:inline-block; transform-origin:50% 100%;
  transform:scaleY(0); opacity:0;
}
.letter:not(.dash){
  text-shadow:1.5px 2.5px 2px rgba(0,0,0,0.5), -0.5px -0.5px 0.5px rgba(255,255,255,0.1);
}
.letter:nth-child(1){animation:popUp .3s ease-out .7s forwards}
.letter:nth-child(2){animation:popUp .3s ease-out .9s forwards}
.letter:nth-child(3){animation:popUp .3s ease-out 1.1s forwards}
.letter:nth-child(4){animation:popScale .25s ease-out 1.3s forwards}
.letter:nth-child(5){animation:popUp .3s ease-out 1.5s forwards}
.letter:nth-child(6){animation:popUp .3s ease-out 1.7s forwards}
@keyframes slideIn{
  0%{opacity:0;transform:translateX(50%)}
  100%{opacity:1;transform:translateX(0)}
}
@keyframes popUp{
  0%{transform:scaleY(0);opacity:0}
  100%{transform:scaleY(1);opacity:1}
}
@keyframes popScale{
  0%{transform:scale(0);opacity:0}
  100%{transform:scale(1);opacity:1}
}
.subtitle {
  color:#A0A0A8; font-size:18px; letter-spacing:6px; text-transform:uppercase;
  margin-top:20px; opacity:0; animation:fadeUp .6s ease-out 2.5s forwards;
}
@keyframes fadeUp{
  0%{opacity:0;transform:translateY(20px)}
  100%{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="logo">
  <span class="letter">P</span>
  <span class="letter">I</span>
  <span class="letter">P</span>
  <span class="letter dash" style="font-size:80px;font-weight:100;transform-origin:50% 50%">-</span>
  <span class="letter">T</span>
  <span class="letter">V</span>
</div>
<div class="subtitle">Live TV Channels</div>
</body>
</html>
